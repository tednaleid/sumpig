name: Benchmarks

on:
  push:
    tags: ['v*']

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just bench
      - uses: actions/upload-artifact@v7
        with:
          name: criterion-report
          path: target/criterion/
          retention-days: 90
