name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-26
          - target: aarch64-apple-darwin
            os: macos-26
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup target add ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../sumpig-${{ matrix.target }}.tar.gz sumpig
      - uses: actions/upload-artifact@v5
        with:
          name: sumpig-${{ matrix.target }}
          path: sumpig-${{ matrix.target }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true
      - name: Ensure annotated tag is available
        run: git fetch origin "refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}" --force
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --notes-from-tag \
            sumpig-*.tar.gz

      # -- Update Homebrew formula --

      - name: Compute artifact SHA-256 values
        if: env.HOMEBREW_TAP_TOKEN != ''
        id: sha256
        run: |
          echo "macos_arm=$(shasum -a 256 sumpig-aarch64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "macos_intel=$(shasum -a 256 sumpig-x86_64-apple-darwin.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "linux=$(shasum -a 256 sumpig-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256_MACOS_ARM="${{ steps.sha256.outputs.macos_arm }}"
          SHA256_MACOS_INTEL="${{ steps.sha256.outputs.macos_intel }}"
          SHA256_LINUX="${{ steps.sha256.outputs.linux }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/tednaleid/homebrew-sumpig.git" /tmp/homebrew-sumpig
          cd /tmp/homebrew-sumpig

          mkdir -p Formula
          cat > Formula/sumpig.rb << FORMULA
          class Sumpig < Formula
            desc "Merkle tree directory fingerprinting and comparison"
            homepage "https://github.com/tednaleid/sumpig"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/tednaleid/sumpig/releases/download/v#{version}/sumpig-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA256_MACOS_ARM}"
              end
              on_intel do
                url "https://github.com/tednaleid/sumpig/releases/download/v#{version}/sumpig-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA256_MACOS_INTEL}"
              end
            end
            on_linux do
              on_intel do
                url "https://github.com/tednaleid/sumpig/releases/download/v#{version}/sumpig-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA256_LINUX}"
              end
            end

            def install
              bin.install "sumpig"
            end

            test do
              system "#{bin}/sumpig", "--version"
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sumpig.rb
          git diff --cached --quiet && echo "No formula changes" && exit 0
          git commit -m "Update sumpig to ${VERSION}"
          git push
